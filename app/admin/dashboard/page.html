<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin ESTUDIOK</title>
    <style>
        body { 
            background: #0A0A0A; 
            color: white; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        .card { 
            background: #1A1A1A; 
            padding: 20px; 
            border-radius: 8px; 
            margin: 10px 0; 
        }
        a { 
            color: #00D4FF; 
            text-decoration: none; 
            display: block; 
            padding: 10px; 
        }
        a:hover { 
            background: #2A2A2A; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin: 20px 0; 
        }
        .btn-home {
            background: #00D4FF;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            text-decoration: none;
            font-weight: bold;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>Admin ESTUDIOK</h1>
    <p>Dashboard simplificado</p>
    
    <div class="grid">
        <div class="card">
            <a href="/admin/leads">👥 Leads</a>
            <p style="color: #00D4FF; font-size: 2em; margin: 10px 0 0 0;">0</p>
        </div>
        <div class="card">
            <a href="/admin/projects">📁 Projetos</a>
            <p style="color: green; font-size: 2em; margin: 10px 0 0 0;">0</p>
        </div>
        <div class="card">
            <a href="/admin/financeiro">💰 Financeiro</a>
            <p style="color: purple; font-size: 2em; margin: 10px 0 0 0;">R$ 0</p>
        </div>
        <div class="card">
            <a href="/admin/portfolio">🎨 Portfólio</a>
            <p style="color: orange; font-size: 2em; margin: 10px 0 0 0;">0</p>
        </div>
    </div>
    
    <div>
        <a href="/" class="btn-home">🏠 Ver Site Principal</a>
    </div>
</body>
</html>
